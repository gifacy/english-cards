        {en:'munch',zh:'大聲咀嚼',zy:['ㄉㄚˋ','ㄕㄥ','ㄐㄩˇ','ㄐㄩㄝˊ'],tone:['ˋ','','ˇ','ˊ']},
        {en:'fish',zh:'魚',zy:['ㄩˊ'],tone:['ˊ']},
        {en:'dish',zh:'碟子盤子',zy:['ㄉㄧㄝˊ','ㄗ˙','ㄆㄢˊ','ㄗ˙'],tone:['ˊ','˙','ˊ','˙']},
        {en:'king',zh:'國王',zy:['ㄍㄨㄛˊ','ㄨㄤˊ'],tone:['ˊ','ˊ']},
        {en:'long',zh:'長的',zy:['ㄔㄤˊ','ㄉㄜ˙'],tone:['ˊ','˙']},
        {en:'habitat',zh:'棲息地',zy:['ㄑㄧ','ㄒㄧˊ','ㄉㄧˋ'],tone:['','ˊ','ˋ']},
        {en:'shelter',zh:'避難所庇護所',zy:['ㄅㄧˋ','ㄋㄢˋ','ㄙㄨㄛˇ','ㄅㄧˋ','ㄏㄨˋ','ㄙㄨㄛˇ'],tone:['ˋ','ˋ','ˇ','ˋ','ˋ','ˇ']}
    ];

    let currentList = [...originalWords];
    let idx = 0;
    let isRevealed = false;
    const colors = ['#4dabf7', '#74c0fc', '#339af0', '#228be6', '#1c7ed6', '#4263eb', '#3b5bdb'];

    function init() {
        currentList = [...originalWords];
        idx = 0;
        update();
    }

    function shuffleAndStart() {
        currentList = [...originalWords].sort(() => Math.random() - 0.5);
        idx = 0;
        update();
    }

    function update() {
        isRevealed = false;
        if (currentList.length === 0) return;
        
        const item = currentList[idx];
        const enDisplay = document.getElementById('enWord');
        const container = document.getElementById('chineseContainer');
        const card = document.getElementById('wordCard');
        
        card.classList.remove('show-answer');
        document.getElementById('progress').innerText = `${idx + 1} / ${currentList.length}`;
        
        enDisplay.innerText = "???";
        enDisplay.classList.add('is-hidden');
        
        container.innerHTML = '';
        
        // 過濾斜線等特殊符號以正確拆分中文字
        const cleanZh = item.zh.replace(/[\/\s]/g, '');
        cleanZh.split('').forEach((char, i) => {
            const pureZy = item.zy[i] ? item.zy[i].replace(/[ˊˇˋ˙]/g, '') : '';
            const toneMark = item.tone[i] || '';
            let toneClass = (toneMark === '˙') ? "tone-light" : "tone";

            const unit = document.createElement('div');
            unit.className = 'char-unit';
            unit.innerHTML = `
                <span class="main-char">${char}</span>
                <div class="bopomofo-container">
                    <span class="bopomofo-text">${pureZy}</span>
                    <span class="${toneClass}">${toneMark}</span>
                </div>
            `;
            container.appendChild(unit);
        });
        
        const icon = document.getElementById('wordIcon');
        icon.innerText = item.en.charAt(0).toUpperCase();
        icon.style.backgroundColor = colors[idx % colors.length];
        
        // 自動針對較長的英文單字進行字型縮放調整
        if(item.en.length > 12) {
            enDisplay.style.fontSize = '26px';
        } else if(item.en.length > 9) {
            enDisplay.style.fontSize = '34px';
        } else if(item.en.length > 6) {
            enDisplay.style.fontSize = '40px';
        } else {
            enDisplay.style.fontSize = '52px';
        }
    }

    function handleCardClick() {
        if (currentList.length === 0) return;
        if (!isRevealed) {
            isRevealed = true;
            const item = currentList[idx];
            const enDisplay = document.getElementById('enWord');
            enDisplay.innerText = item.en;
            enDisplay.classList.remove('is-hidden');
            document.getElementById('wordCard').classList.add('show-answer');
        }
        speak();
    }

    function speak() {
        if (currentList.length === 0) return;
        const msg = new SpeechSynthesisUtterance(currentList[idx].en);
        msg.lang = 'en-US';
        msg.rate = 0.7;
        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(msg);
    }

    function nextWord() {
        if (currentList.length === 0) return;
        idx = (idx + 1) % currentList.length;
        update();
    }

    init();
</script>
</body>
</html>
