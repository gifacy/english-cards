    <style>
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; background-color: #f0f4f8; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { text-align: center; background: white; padding: 20px; border-radius: 35px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 380px; border: 6px solid #a5d8ff; margin: 20px; }
        .progress { color: #4dabf7; font-weight: bold; margin-bottom: 10px; font-size: 18px; }
        .card { cursor: pointer; padding: 20px; border: 4px solid #4dabf7; border-radius: 25px; margin-bottom: 20px; background-color: #ffffff; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 400px; position: relative; overflow: hidden; }
        .initial-icon { width: 80px; height: 80px; line-height: 80px; border-radius: 50%; background-color: #4dabf7; color: white; font-size: 50px; font-weight: bold; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .english { font-size: 45px; font-weight: bold; color: #1c7ed6; display: block; min-height: 60px; margin-bottom: 10px; word-break: break-word; line-height: 1.1; width: 90%; }
        .is-hidden { color: #f1f3f5 !important; letter-spacing: 5px; } 
        .chinese-area { display: flex; justify-content: center; align-items: flex-start; gap: 4px; flex-wrap: wrap; width: 100%; }
        .char-unit { display: inline-flex; align-items: center; position: relative; padding-right: 20px; margin: 5px 0; }
        .main-char { font-size: 40px; font-weight: bold; color: #2c3e50; line-height: 1.1; }
        .bopomofo-container { position: absolute; right: 2px; top: 50%; transform: translateY(-50%); display: flex; align-items: center; }
        .bopomofo-text { writing-mode: vertical-rl; font-size: 16px; color: #7f8c8d; line-height: 1; letter-spacing: 1px; text-orientation: upright; }
        .tone { position: absolute; right: -10px; top: 50%; transform: translateY(-50%); font-size: 14px; color: #7f8c8d; font-weight: bold; }
        .tone-light { position: absolute; right: 4px; top: -12px; font-size: 14px; color: #7f8c8d; }
        .btn-next { width: 100%; padding: 15px; font-size: 22px; background-color: #339af0; color: white; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; box-shadow: 0 5px 0 #1c7ed6; }
        .btn-next:active { transform: translateY(3px); box-shadow: 0 2px 0 #1c7ed6; }
        .reset-btn { margin-top: 15px; color: #adb5bd; cursor: pointer; font-size: 13px; text-decoration: underline; }
    </style>
</head>

    let currentList = [...originalWords];
    let idx = 0;
    let isRevealed = false;
    const colors = ['#4dabf7', '#74c0fc', '#339af0', '#228be6', '#1c7ed6', '#4263eb', '#3b5bdb'];

    function init() {
        currentList = [...originalWords];
        idx = 0;
        update();
    }

    function shuffleAndStart() {
        currentList = [...originalWords].sort(() => Math.random() - 0.5);
        idx = 0;
        update();
    }

    function update() {
        isRevealed = false;
        const item = currentList[idx];
        const enDisplay = document.getElementById('enWord');
        const container = document.getElementById('chineseContainer');
        const card = document.getElementById('wordCard');
        
        card.classList.remove('show-answer');
        document.getElementById('progress').innerText = `${idx + 1} / ${currentList.length}`;
        
        enDisplay.innerText = "???";
        enDisplay.classList.add('is-hidden');
        
        container.innerHTML = '';
        item.zh.split('').forEach((char, i) => {
            const pureZy = item.zy[i].replace(/[ˊˇˋ˙]/g, '');
            const toneMark = item.tone[i];
            let toneClass = (toneMark === '˙') ? "tone-light" : "tone";

            const unit = document.createElement('div');
            unit.className = 'char-unit';
            unit.innerHTML = `
                <span class="main-char">${char}</span>
                <div class="bopomofo-container">
                    <span class="bopomofo-text">${pureZy}</span>
                    <span class="${toneClass}">${toneMark}</span>
                </div>
            `;
            container.appendChild(unit);
        });
        
        const icon = document.getElementById('wordIcon');
        icon.innerText = item.en.charAt(0).toUpperCase();
        icon.style.backgroundColor = colors[idx % colors.length];
        
        // 針對長英文單字調整
        if(item.en.length > 10) {
            enDisplay.style.fontSize = '30px';
        } else if(item.en.length > 7) {
            enDisplay.style.fontSize = '40px';
        } else {
            enDisplay.style.fontSize = '52px';
        }
    }

    function handleCardClick() {
        if (!isRevealed) {
            isRevealed = true;
            const item = currentList[idx];
            const enDisplay = document.getElementById('enWord');
            enDisplay.innerText = item.en;
            enDisplay.classList.remove('is-hidden');
            document.getElementById('wordCard').classList.add('show-answer');
        }
        speak();
    }

    function speak() {
        const msg = new SpeechSynthesisUtterance(currentList[idx].en);
        msg.lang = 'en-US';
        msg.rate = 0.7;
        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(msg);
    }

    function nextWord() {
        idx = (idx + 1) % currentList.length;
        update();
    }

    init();
